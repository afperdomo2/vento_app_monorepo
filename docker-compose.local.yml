# Docker Compose - Entorno Local
# Solo infraestructura - los microservicios se ejecutan localmente con Gradle para hot reload

name: vento-app-local

services:
  # PostgreSQL para Event Service
  postgres-events:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: events_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-events-data-local:/var/lib/postgresql/data
    networks:
      - vento-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL para Order Service
  postgres-orders:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: orders_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-orders-data-local:/var/lib/postgresql/data
    networks:
      - vento-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis para cache y gestión de stock
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data-local:/data
    networks:
      - vento-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Keycloak para autenticación y gestión de usuarios
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8180:8080"
    command: start-dev
    volumes:
      - keycloak-data-local:/opt/keycloak/data
    networks:
      - vento-network
    healthcheck:
      test: [ "CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080;echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3;grep -q '200 OK' <&3" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  kafka:
    image: apache/kafka:4.1.1
    ports:
      - "9092:9092"     # Internal listener (container-to-container)
      - "9093:9093"     # External listener (host access)
    environment:
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENERS=INTERNAL://:9092,EXTERNAL://:9093,CONTROLLER://:9094
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka:9092,EXTERNAL://localhost:9093
      - KAFKA_BROKER_ID=1
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9094
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=false
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_LOG_DIRS=/var/lib/kafka/data
    volumes:
      - kafka-data-local:/var/lib/kafka/data
    networks:
      - vento-network
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Inicialización de topics Kafka
  kafka-init:
    image: apache/kafka:4.1.1
    volumes:
      - ./scripts/init-kafka.sh:/init-kafka.sh
    command: ["sh", "/init-kafka.sh"]
    networks:
      - vento-network
    depends_on:
      kafka:
        condition: service_healthy
    restart: "no"

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    ports:
      - "8089:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - vento-network
    depends_on:
      kafka:
        condition: service_healthy

  # Payment Service - Servicio simulado de pagos
  payment-service:
    build:
      context: .
      dockerfile: microservices/payment-service/Dockerfile.dev
    ports:
      - "8084:8084"
      - "5009:5005"
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - SERVER_PORT=8084
    networks:
      - vento-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8084/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  vento-network:
    driver: bridge

volumes:
  postgres-events-data-local:
    driver: local
  postgres-orders-data-local:
    driver: local
  redis-data-local:
    driver: local
  keycloak-data-local:
    driver: local
  kafka-data-local:
    driver: local
