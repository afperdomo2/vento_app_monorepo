# Docker Compose - Entorno de Desarrollo (Dev)
# Todos los servicios en contenedores Docker con configuración de desarrollo

name: vento-app-dev

services:
  # PostgreSQL para Event Service
  postgres-events:
    image: postgres:16-alpine
    container_name: postgres-events
    environment:
      POSTGRES_DB: events_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    networks:
      - vento-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL para Order Service
  postgres-orders:
    image: postgres:16-alpine
    container_name: postgres-orders
    environment:
      POSTGRES_DB: orders_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    networks:
      - vento-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis para cache y gestión de stock
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - vento-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Keycloak para autenticación y gestión de usuarios
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: dev-mem
    ports:
      - "8180:8080"
    command: start-dev
    networks:
      - vento-network
    healthcheck:
      test: [ "CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080;echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3;grep -q '200 OK' <&3" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Event Service
  event-service:
    build:
      context: .
      dockerfile: microservices/event-service/Dockerfile.dev
    container_name: event-service
    ports:
      - "8082:8082"
      - "5005:5005"  # Debug port
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DATABASE_HOST: postgres-events
      DATABASE_PORT: 5432
      DATABASE_NAME: events_db
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
    depends_on:
      postgres-events:
        condition: service_healthy
    networks:
      - vento-network

  # Order Service
  order-service:
    build:
      context: .
      dockerfile: microservices/order-service/Dockerfile.dev
    container_name: order-service
    ports:
      - "8083:8083"
      - "5005:5005"  # Debug port
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DATABASE_HOST: postgres-orders
      DATABASE_PORT: 5432
      DATABASE_NAME: orders_db
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      EVENT_SERVICE_URL: http://event-service:8082
    depends_on:
      postgres-orders:
        condition: service_healthy
      event-service:
        condition: service_started
    networks:
      - vento-network

  # API Gateway
  api-gateway:
    build:
      context: .
      dockerfile: microservices/api-gateway/Dockerfile.dev
    container_name: api-gateway
    ports:
      - "8080:8080"
      - "5005:5005"  # Debug port
    environment:
      SPRING_PROFILES_ACTIVE: dev
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/vento-realm
    depends_on:
      event-service:
        condition: service_started
      order-service:
        condition: service_started
      keycloak:
        condition: service_healthy
    networks:
      - vento-network

  # Frontend (placeholder)
  frontend:
    image: node:22-alpine
    container_name: frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    networks:
      - vento-network
    command: sh -c "echo 'Coloca tu frontend en la carpeta ./frontend' && tail -f /dev/null"

networks:
  vento-network:
    driver: bridge
