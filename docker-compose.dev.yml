# Docker Compose - Entorno de Desarrollo (Dev)
# Todos los servicios en contenedores Docker con configuración de desarrollo

name: vento-app-dev

services:
  # PostgreSQL para Event Service
  postgres-events:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_EVENTS_DB:-events_db}
      POSTGRES_USER: ${POSTGRES_EVENTS_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_EVENTS_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres-events-data-dev:/var/lib/postgresql/data
    networks:
      - vento-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_EVENTS_USER:-postgres}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL para Order Service
  postgres-orders:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_ORDERS_DB:-orders_db}
      POSTGRES_USER: ${POSTGRES_ORDERS_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_ORDERS_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - postgres-orders-data-dev:/var/lib/postgresql/data
    networks:
      - vento-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_ORDERS_USER:-postgres}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis para cache y gestión de stock
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data-dev:/data
    networks:
      - vento-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Keycloak para autenticación y gestión de usuarios
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "8180:8080"
    command: start-dev
    volumes:
      - keycloak-data-dev:/opt/keycloak/data
    networks:
      - vento-network
    healthcheck:
      test: [ "CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080;echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3;grep -q '200 OK' <&3" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Kafka para event-driven architecture
  kafka:
    image: apache/kafka:4.1.1
    ports:
      - "9092:9092"     # Internal listener (container-to-container)
      - "9093:9093"     # External listener (host access)
    environment:
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENERS=INTERNAL://:9092,EXTERNAL://:9093,CONTROLLER://:9094
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka:9092,EXTERNAL://localhost:9093
      - KAFKA_BROKER_ID=1
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9094
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=false
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_LOG_DIRS=/var/lib/kafka/data
    volumes:
      - kafka-data-dev:/var/lib/kafka/data
    networks:
      - vento-network
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Inicialización de topics Kafka
  kafka-init:
    image: apache/kafka:4.1.1
    volumes:
      - ./scripts/init-kafka.sh:/init-kafka.sh
    command: ["sh", "/init-kafka.sh"]
    networks:
      - vento-network
    depends_on:
      kafka:
        condition: service_healthy
    restart: "no"

  # Kafka UI para debugging (solo dev)
  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    ports:
      - "8089:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: dev
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - vento-network
    depends_on:
      kafka:
        condition: service_healthy

  # Event Service
  event-service:
    build:
      context: .
      dockerfile: microservices/event-service/Dockerfile.dev
    ports:
      - "8082:8082"
      - "5005:5005"  # Debug port
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DATABASE_HOST: postgres-events
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_EVENTS_DB:-events_db}
      DATABASE_USERNAME: ${POSTGRES_EVENTS_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_EVENTS_PASSWORD:-postgres}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres-events:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vento-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8082/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Order Service
  order-service:
    build:
      context: .
      dockerfile: microservices/order-service/Dockerfile.dev
    ports:
      - "8083:8083"
      - "5006:5005"  # Debug port
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DATABASE_HOST: postgres-orders
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_ORDERS_DB:-orders_db}
      DATABASE_USERNAME: ${POSTGRES_ORDERS_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_ORDERS_PASSWORD:-postgres}
      EVENT_SERVICE_URL: http://event-service:8082
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres-orders:
        condition: service_healthy
      event-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vento-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Payment Service
  payment-service:
    build:
      context: .
      dockerfile: microservices/payment-service/Dockerfile.dev
    ports:
      - "8084:8084"
      - "5009:5005"  # Debug port
    environment:
      SPRING_PROFILES_ACTIVE: dev
    networks:
      - vento-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8084/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # API Gateway
  api-gateway:
    build:
      context: .
      dockerfile: microservices/api-gateway/Dockerfile.dev
    ports:
      - "8080:8080"
      - "5007:5005"  # Debug port
    environment:
      SPRING_PROFILES_ACTIVE: dev
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/vento-realm
    depends_on:
      event-service:
        condition: service_started
      order-service:
        condition: service_started
      payment-service:
        condition: service_started
      keycloak:
        condition: service_healthy
    networks:
      - vento-network

  # Frontend (placeholder)
  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    networks:
      - vento-network
    command: sh -c "echo 'Coloca tu frontend en la carpeta ./frontend' && tail -f /dev/null"

networks:
  vento-network:
    driver: bridge

volumes:
  postgres-events-data-dev:
    driver: local
  postgres-orders-data-dev:
    driver: local
  redis-data-dev:
    driver: local
  keycloak-data-dev:
    driver: local
  kafka-data-dev:
    driver: local
