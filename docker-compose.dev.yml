# Docker Compose - Entorno de Desarrollo (Dev)
# Todos los servicios en contenedores Docker con configuración de desarrollo

name: vento-app-dev

services:
  # PostgreSQL para Event Service
  postgres-events:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_EVENTS_DB:-events_db}
      POSTGRES_USER: ${POSTGRES_EVENTS_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_EVENTS_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres-events-data-dev:/var/lib/postgresql/data
    networks:
      - vento-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_EVENTS_USER:-postgres}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL para Order Service
  postgres-orders:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_ORDERS_DB:-orders_db}
      POSTGRES_USER: ${POSTGRES_ORDERS_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_ORDERS_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - postgres-orders-data-dev:/var/lib/postgresql/data
    networks:
      - vento-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_ORDERS_USER:-postgres}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL para Payment Service
  postgres-payments:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_PAYMENTS_DB:-payments_db}
      POSTGRES_USER: ${POSTGRES_PAYMENTS_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PAYMENTS_PASSWORD:-postgres}
    ports:
      - "5434:5432"
    volumes:
      - postgres-payments-data-dev:/var/lib/postgresql/data
    networks:
      - vento-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_PAYMENTS_USER:-postgres}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis para cache y gestión de stock
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data-dev:/data
    networks:
      - vento-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Keycloak para autenticación y gestión de usuarios
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "8180:8080"
    command: start-dev
    volumes:
      - keycloak-data-dev:/opt/keycloak/data
    networks:
      - vento-network
    healthcheck:
      test: [ "CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080;echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3;grep -q '200 OK' <&3" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Kafka para event-driven architecture
  kafka:
    image: apache/kafka:4.1.1
    ports:
      - "9092:9092"     # Internal listener (container-to-container)
      - "9093:9093"     # External listener (host access)
    environment:
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENERS=INTERNAL://:9092,EXTERNAL://:9093,CONTROLLER://:9094
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka:9092,EXTERNAL://localhost:9093
      - KAFKA_BROKER_ID=1
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9094
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=false
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_LOG_DIRS=/var/lib/kafka/data
      - KAFKA_LOG_RETENTION_HOURS=336 # Retener logs por 14 días (desarrollo)
      - KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS=300000
    volumes:
      - kafka-data-dev:/var/lib/kafka/data
    networks:
      - vento-network
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Inicialización de topics Kafka
  kafka-init:
    image: apache/kafka:4.1.1
    volumes:
      - ./scripts/init-kafka.sh:/init-kafka.sh
    command: ["sh", "/init-kafka.sh"]
    networks:
      - vento-network
    depends_on:
      kafka:
        condition: service_healthy
    restart: "no"

  # Kafka UI para debugging (solo dev)
  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    ports:
      - "8089:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: dev
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - vento-network
    depends_on:
      kafka:
        condition: service_healthy

  # Elasticsearch para búsqueda avanzada de eventos
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.18.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data-dev:/usr/share/elasticsearch/data
    networks:
      - vento-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1g

  # Kibana para desarrollo (UI de Elasticsearch)
  kibana:
    image: docker.elastic.co/kibana/kibana:8.18.0
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    networks:
      - vento-network
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Loki para agregación de logs
  loki:
    image: grafana/loki:3.3.0
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki-data-dev:/loki
    networks:
      - vento-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Promtail para recolección y envío de logs a Loki
  promtail:
    image: grafana/promtail:3.2.1
    volumes:
      - ./scripts/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml
    networks:
      - vento-network
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped

  # Prometheus para métricas de los microservicios
  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data-dev:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - vento-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # OpenTelemetry Collector - recibe traces de todos los servicios
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.120.0
    ports:
      - "4318:4318"  # HTTP receiver
      - "4317:4317"  # gRPC receiver
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
    networks:
      - vento-network
    depends_on:
      jaeger:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:13133/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Jaeger - visualización de traces distribuidos
  jaeger:
    image: jaegertracing/all-in-one:1.64.0
    ports:
      - "16686:16686"  # UI web
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - vento-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:14269/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Grafana para dashboards de métricas y logs
  grafana:
    image: grafana/grafana-oss:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana-data-dev:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning-dev/datasources:/etc/grafana/provisioning/datasources/extra
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - vento-network
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Event Service
  event-service:
    build:
      context: .
      dockerfile: microservices/event-service/Dockerfile.dev
    ports:
      - "8082:8082"
      - "5005:5005"  # Debug port
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DATABASE_HOST: postgres-events
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_EVENTS_DB:-events_db}
      DATABASE_USERNAME: ${POSTGRES_EVENTS_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_EVENTS_PASSWORD:-postgres}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres-events:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    networks:
      - vento-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8082/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Order Service
  order-service:
    build:
      context: .
      dockerfile: microservices/order-service/Dockerfile.dev
    ports:
      - "8083:8083"
      - "5006:5005"  # Debug port
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DATABASE_HOST: postgres-orders
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_ORDERS_DB:-orders_db}
      DATABASE_USERNAME: ${POSTGRES_ORDERS_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_ORDERS_PASSWORD:-postgres}
      EVENT_SERVICE_URL: http://event-service:8082
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres-orders:
        condition: service_healthy
      event-service:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    networks:
      - vento-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Payment Service
  payment-service:
    build:
      context: .
      dockerfile: microservices/payment-service/Dockerfile.dev
    ports:
      - "8084:8084"
      - "5009:5005"  # Debug port
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DATABASE_HOST: postgres-payments
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_PAYMENTS_DB:-payments_db}
      DATABASE_USERNAME: ${POSTGRES_PAYMENTS_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PAYMENTS_PASSWORD:-postgres}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres-payments:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    networks:
      - vento-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8084/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # API Gateway
  api-gateway:
    build:
      context: .
      dockerfile: microservices/api-gateway/Dockerfile.dev
    ports:
      - "8080:8080"
      - "5007:5005"  # Debug port
    environment:
      SPRING_PROFILES_ACTIVE: dev
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/vento-realm
    depends_on:
      event-service:
        condition: service_started
      order-service:
        condition: service_started
      payment-service:
        condition: service_started
      keycloak:
        condition: service_healthy
    networks:
      - vento-network

  # Frontend (placeholder)
  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    networks:
      - vento-network
    command: sh -c "echo 'Coloca tu frontend en la carpeta ./frontend' && tail -f /dev/null"

networks:
  vento-network:
    driver: bridge

volumes:
  postgres-events-data-dev:
    driver: local
  postgres-orders-data-dev:
    driver: local
  postgres-payments-data-dev:
    driver: local
  redis-data-dev:
    driver: local
  keycloak-data-dev:
    driver: local
  kafka-data-dev:
    driver: local
  elasticsearch-data-dev:
    driver: local
  loki-data-dev:
    driver: local
  prometheus-data-dev:
    driver: local
  grafana-data-dev:
    driver: local
