# API Gateway - Configuración Local
# Rutas apuntan a localhost donde corren los microservicios con Gradle

spring:
  config:
    activate:
      on-profile: local
  cloud:
    gateway:
      routes:
        - id: event-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/events/**

        - id: order-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/orders/**

        - id: payment-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/payments/**

        - id: frontend
          uri: http://localhost:3000
          predicates:
            - Path=/ui/**
          filters:
            - StripPrefix=1
