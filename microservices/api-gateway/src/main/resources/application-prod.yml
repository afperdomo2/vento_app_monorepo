# API Gateway - Configuración de Producción (Prod)
# Rutas apuntan a los contenedores Docker con configuración de seguridad

spring:
  config:
    activate:
      on-profile: prod
  cloud:
    gateway:
      routes:
        - id: event-service
          uri: http://event-service:8082
          predicates:
            - Path=/api/events/**

        - id: order-service
          uri: http://order-service:8083
          predicates:
            - Path=/api/orders/**

        - id: frontend
          uri: http://frontend:3000
          predicates:
            - Path=/ui/**
          filters:
            - StripPrefix=1

# CORS Configuration for Production
# In production, these should be set via environment variables in docker-compose.prod.yml
app:
  cors:
    # IMPORTANT: Set these via environment variables in production!
    # Example in docker-compose.prod.yml:
    #   environment:
    #     - CORS_ALLOWED_ORIGINS=https://vento.app,https://www.vento.app
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
    allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
    allowed-headers: ${CORS_ALLOWED_HEADERS:Authorization,Content-Type,Accept,X-Requested-With,Origin}
    exposed-headers: ${CORS_EXPOSED_HEADERS:X-User-Id,X-User-Roles}
    allow-credentials: ${CORS_ALLOW_CREDENTIALS:true}
    max-age: ${CORS_MAX_AGE:86400}  # 24 hours for production

logging:
  level:
    org.springframework.cloud.gateway: INFO
    org.springframework.security: INFO
