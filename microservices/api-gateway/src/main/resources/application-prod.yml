# API Gateway - Configuración de Producción (Prod)
# Rutas apuntan a los contenedores Docker con configuración de seguridad

spring:
  config:
    activate:
      on-profile: prod
  cloud:
    gateway:
      routes:
        - id: event-service
          uri: http://event-service:8082
          predicates:
            - Path=/api/events/**

        - id: order-service
          uri: http://order-service:8083
          predicates:
            - Path=/api/orders/**

        - id: frontend
          uri: http://frontend:3000
          predicates:
            - Path=/ui/**
          filters:
            - StripPrefix=1

server:
  port: 8080

logging:
  level:
    org.springframework.cloud.gateway: INFO
