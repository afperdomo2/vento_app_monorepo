# API Gateway
spring:
  application:
    name: api-gateway
  config:
    import: optional:file:./config/api-gateway.yml
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: http://user-service:8081
              predicates:
                - Path=/api/users/**
              filters:
                - StripPrefix=1

server:
  port: 8080
