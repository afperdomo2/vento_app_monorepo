# API Gateway
spring:
  application:
    name: api-gateway
  config:
    import: optional:file:./config/api-gateway.yml
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: event-service
              uri: http://event-service:8082
              predicates:
                - Path=/api/events/**
              filters:
                - StripPrefix=1
            - id: order-service
              uri: http://order-service:8083
              predicates:
                - Path=/api/orders/**
              filters:
                - StripPrefix=1
            - id: frontend
              uri: http://frontend:3000
              predicates:
                - Path=/ui/**
              filters:
                - StripPrefix=1

server:
  port: 8080
