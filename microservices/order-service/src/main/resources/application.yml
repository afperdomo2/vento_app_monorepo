spring:
  application:
    name: order-service
  config:
    import: optional:file:./config/order-service.yml
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

server:
  port: ${SERVER_PORT:8083}

# Event Service URL para Feign Client
event:
  service:
    url: ${EVENT_SERVICE_URL:http://localhost:8082}

# Feign Client Configuration
feign:
  client:
    config:
      event-service:
        connectTimeout: 5000
        readTimeout: 5000
        loggerLevel: BASIC
  compression:
    request:
      enabled: true
    response:
      enabled: true

vento:
  redis:
    key-prefix: "vento:"
  # Configuraciones para la gestión de reservas y expiraciones
  reservation:
    ttl-minutes: 5
    max-retries: 3
  # Configuración para la limpieza de reservas expiradas
  expiration:
    check-interval-ms: 60000
    initial-delay-ms: 30000

# Kafka Configuration
spring.kafka:
  bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9093}
  producer:
    key-serializer: org.apache.kafka.common.serialization.StringSerializer
    value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    acks: all
    retries: 3
    properties:
      enable.idempotence: true
  consumer:
    key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
    auto-offset-reset: earliest
    properties:
      spring.json.trusted.packages: "com.vento.common.dto.kafka.*,com.vento.order.*"
      spring.json.value.default.type: java.lang.Object
  listener:
    ack-mode: record
    concurrency: 3

spring-doc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
