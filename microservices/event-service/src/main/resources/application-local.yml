# Event Service - Configuración Local
# PostgreSQL en Docker - Conexión hardcodeada para desarrollo rápido

spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://localhost:5432/events_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: false

vento:
  elasticsearch:
    sync:
      enabled: true
      sync-interval-ms: 300000     # 5 minutos
      sync-initial-delay-ms: 60000 # 1 minuto al inicio

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
