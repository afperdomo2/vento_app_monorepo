# Event Service - Configuración de Desarrollo (Dev)
# PostgreSQL con variables de entorno

spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://${DATABASE_HOST:localhost}:${DATABASE_PORT:5432}/${DATABASE_NAME:events_db}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: false

vento:
  elasticsearch:
    sync:
      enabled: true
      sync-interval-ms: 300000     # 5 minutos
      sync-initial-delay-ms: 60000 # 1 minuto al inicio

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
