# Docker Compose - Entorno de Producción (Prod)
# Todos los servicios en contenedores Docker con configuración de producción

name: vento-app-prod

services:
  # PostgreSQL para Event Service
  postgres-events:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_EVENTS_DB:-events_db}
      POSTGRES_USER: ${POSTGRES_EVENTS_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_EVENTS_PASSWORD:?Database password required}
    volumes:
      - postgres-events-data-prod:/var/lib/postgresql/data
    networks:
      - vento-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_EVENTS_USER:-postgres}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # PostgreSQL para Order Service
  postgres-orders:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_ORDERS_DB:-orders_db}
      POSTGRES_USER: ${POSTGRES_ORDERS_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_ORDERS_PASSWORD:?Database password required}
    volumes:
      - postgres-orders-data-prod:/var/lib/postgresql/data
    networks:
      - vento-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_ORDERS_USER:-postgres}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # PostgreSQL para Payment Service
  postgres-payments:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_PAYMENTS_DB:-payments_db}
      POSTGRES_USER: ${POSTGRES_PAYMENTS_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PAYMENTS_PASSWORD:?Database password required}
    volumes:
      - postgres-payments-data-prod:/var/lib/postgresql/data
    networks:
      - vento-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_PAYMENTS_USER:-postgres}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis para cache y gestión de stock
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data-prod:/data
    networks:
      - vento-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Elasticsearch para búsqueda avanzada de eventos (sin Kibana en prod)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    volumes:
      - elasticsearch-data-prod:/usr/share/elasticsearch/data
    networks:
      - vento-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2g

  # Kibana para visualización de datos de Elasticsearch
  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.0
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    networks:
      - vento-network
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # Keycloak para autenticación y gestión de usuarios
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?Keycloak admin password required}
    ports:
      - "8180:8080"
    command: start-dev
    volumes:
      - keycloak-data-prod:/opt/keycloak/data
    networks:
      - vento-network
    healthcheck:
      test: [ "CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080;echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3;grep -q '200 OK' <&3" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # Loki para agregación de logs
  loki:
    image: grafana/loki:3.3.0
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki-data-prod:/loki
    networks:
      - vento-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m

  # Promtail para recolección y envío de logs a Loki
  promtail:
    image: grafana/promtail:3.2.1
    volumes:
      - ./scripts/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml
    networks:
      - vento-network
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped

  # Prometheus para métricas (sin puertos expuestos — acceso interno only)
  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data-prod:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - vento-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g

  # OpenTelemetry Collector — recibe traces de todos los servicios
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.120.0
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
    networks:
      - vento-network
    depends_on:
      jaeger:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:13133/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Jaeger — visualización de traces distribuidos (sin puertos expuestos)
  jaeger:
    image: jaegertracing/all-in-one:1.64.0
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - vento-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:14269/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Grafana para dashboards
  grafana:
    image: grafana/grafana-oss:latest
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?Grafana admin password required}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3001}
    volumes:
      - grafana-data-prod:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning-prod/datasources:/etc/grafana/provisioning/datasources/extra
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - vento-network
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Kafka para event-driven architecture
  kafka:
    image: apache/kafka:4.1.1
    ports:
      - "9092:9092"     # Internal listener (container-to-container only)
    environment:
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENERS=INTERNAL://:9092,CONTROLLER://:9094
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka:9092
      - KAFKA_BROKER_ID=1
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9094
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=false
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_LOG_DIRS=/var/lib/kafka/data
      - KAFKA_LOG_RETENTION_HOURS=168 # Retener logs por 7 días (producción)
      - KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS=300000
    volumes:
      - kafka-data-prod:/var/lib/kafka/data
    networks:
      - vento-network
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # Inicialización de topics Kafka
  kafka-init:
    image: apache/kafka:4.1.1
    volumes:
      - ./scripts/init-kafka.sh:/init-kafka.sh
    command: ["sh", "/init-kafka.sh"]
    networks:
      - vento-network
    depends_on:
      kafka:
        condition: service_healthy
    restart: "no"

  # Event Service
  event-service:
    build:
      context: .
      dockerfile: microservices/event-service/Dockerfile.prod
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_HOST: postgres-events
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_EVENTS_DB:-events_db}
      DATABASE_USERNAME: ${POSTGRES_EVENTS_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_EVENTS_PASSWORD:?Database password required}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://otel-collector:4318/v1/traces
    depends_on:
      postgres-events:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - vento-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8082/actuator/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Order Service
  order-service:
    build:
      context: .
      dockerfile: microservices/order-service/Dockerfile.prod
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_HOST: postgres-orders
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_ORDERS_DB:-orders_db}
      DATABASE_USERNAME: ${POSTGRES_ORDERS_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_ORDERS_PASSWORD:?Database password required}
      EVENT_SERVICE_URL: http://event-service:8082
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://otel-collector:4318/v1/traces
    depends_on:
      postgres-orders:
        condition: service_healthy
      event-service:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - vento-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8083/actuator/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Payment Service
  payment-service:
    build:
      context: .
      dockerfile: microservices/payment-service/Dockerfile.prod
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_HOST: postgres-payments
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_PAYMENTS_DB:-payments_db}
      DATABASE_USERNAME: ${POSTGRES_PAYMENTS_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PAYMENTS_PASSWORD:?Database password required}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://otel-collector:4318/v1/traces
    depends_on:
      postgres-payments:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - vento-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8084/actuator/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # API Gateway
  api-gateway:
    build:
      context: .
      dockerfile: microservices/api-gateway/Dockerfile.prod
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/vento-realm
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://otel-collector:4318/v1/traces
    depends_on:
      event-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - vento-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Frontend — Angular SPA served by Nginx
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.prod
      args:
        API_URL: ${API_URL:-http://localhost:8080}
        KEYCLOAK_URL: ${KEYCLOAK_URL:-http://localhost:8180}
        KEYCLOAK_REALM: ${KEYCLOAK_REALM:-vento-realm}
        KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-vento-frontend}
    ports:
      - "3000:3000"
    environment:
      API_URL: ${API_URL:-http://localhost:8080}
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://localhost:8180}
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - vento-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  vento-network:
    driver: bridge

volumes:
  postgres-events-data-prod:
    driver: local
  postgres-orders-data-prod:
    driver: local
  postgres-payments-data-prod:
    driver: local
  redis-data-prod:
    driver: local
  keycloak-data-prod:
    driver: local
  kafka-data-prod:
    driver: local
  elasticsearch-data-prod:
    driver: local
  loki-data-prod:
    driver: local
  prometheus-data-prod:
    driver: local
  grafana-data-prod:
    driver: local
